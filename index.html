<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Spaces Embed — NYT Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: #f8f7f2; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-text-size-adjust: 100%; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes typing-dot { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

  /* NYT header — desktop defaults */
  .nyt-top { padding: 8px 40px; }
  .nyt-logo { font-size: 28px; }
  .nyt-nav-bottom { gap: 24px; padding: 6px 0; justify-content: center; }
  .article-col { max-width: 680px; margin: 0 auto; padding: 28px 24px 80px; }
  .article-headline { font-size: 38px; }
  .article-dek { font-size: 17px; }
  .article-body-p { font-size: 15px; line-height: 1.8; }
  .article-hero { height: 380px; }

  /* Mobile */
  @media (max-width: 720px) {
    .nyt-top { padding: 8px 14px !important; gap: 8px; }
    .nyt-logo { font-size: 19px !important; letter-spacing: -0.3px !important; }
    .nyt-side-left, .nyt-side-right { display: none !important; }
    .nyt-nav-bottom {
      gap: 18px !important;
      padding: 8px 14px !important;
      overflow-x: auto;
      flex-wrap: nowrap !important;
      justify-content: flex-start !important;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .nyt-nav-bottom::-webkit-scrollbar { display: none; }
    .nyt-nav-item { flex-shrink: 0; }
    .article-col { padding: 20px 18px 60px !important; }
    .article-headline { font-size: 26px !important; line-height: 1.2 !important; }
    .article-dek { font-size: 15px !important; }
    .article-body-p { font-size: 16px !important; line-height: 1.65 !important; }
    .article-hero { height: 220px !important; }
    /* Collapse toolbar on phones — hide label text, keep icons */
    .nyt-toolbar .nyt-tb-btn span { display: none !important; }
    .nyt-toolbar .nyt-tb-btn { padding: 5px 10px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const T = {
  adobeRed: '#FA0F00',
  purple: '#8B7CE8',
  purpleGrad: 'linear-gradient(135deg, #8B7CE8, #b09cf0)',
  purpleLight: '#f0ecff',
  purpleBorder: 'rgba(139,124,232,0.35)',
  purpleFocus: 'rgba(139,124,232,0.45)',
  citeBg: '#EAE8F5',
  citeText: '#5a50a0',
  white: '#fff',
  border: '#e4e4e4',
  muted: '#6e6e6e',
  ink: '#121212',
  inputBg: '#f5f5f5',
  embedHeaderBg: 'linear-gradient(135deg, #8B7CE8 0%, #a98ef0 100%)',
};
const SYS = "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
const TIMES = "'Times New Roman', Georgia, serif";

// ── NYT sources ───────────────────────────────────────────
const SOURCES = [
  { title: 'Heat Kills More Americans Than Any Other Weather', short: 'Heat & Mortality', url: 'https://www.nytimes.com/2022/06/09/climate/heat-wave-deaths.html', date: 'Jun 9, 2022', snippet: 'More than 700 heat-related deaths occur each year in the U.S. on average — a figure that has climbed steadily over the past two decades as temperatures rise.' },
  { title: 'The Economic Toll of a Warming World', short: 'Economic Toll', url: 'https://www.nytimes.com/2023/05/14/climate/economic-cost-climate-change.html', date: 'May 14, 2023', snippet: 'Global extreme heat costs could reach $3.1 trillion annually by 2035, with labor productivity losses alone accounting for more than half of the projected damages.' },
  { title: 'How Extreme Heat Is Reshaping Global Work', short: 'Reshaping Work', url: 'https://www.nytimes.com/2024/07/22/business/economy/heat-wave-workers.html', date: 'Jul 22, 2024', snippet: 'Construction, agriculture, and logistics workers face the steepest productivity declines. Infrastructure strain on roads and power grids compounds the losses.' },
  { title: 'What Scientists Know About Heat and the Body', short: 'Heat & Health', url: 'https://www.nytimes.com/2023/08/08/health/heat-wave-body-health.html', date: 'Aug 8, 2023', snippet: 'Heat-related ER visits have surged in heat-prone regions, with the elderly, outdoor workers, and those with chronic conditions most at risk during prolonged waves.' },
  { title: 'Crops Are Failing. Heat Is a Major Reason Why.', short: 'Crops Failing', url: 'https://www.nytimes.com/2024/09/03/climate/crops-failing-heat-agriculture.html', date: 'Sep 3, 2024', snippet: 'Agricultural losses from heat stress could cost the U.S. $2.1B annually by 2040, with global losses reaching an estimated $14B per year by 2035.' },
];

const SUGGESTIONS = [
  'What are the biggest economic costs of extreme heat?',
  'Compare heat mortality findings across these articles',
  'Which industries face the greatest productivity losses?',
  'How does extreme heat affect agriculture?',
  'What are the health impacts of heat waves?',
];

// Pre-canned featured Q&A
const FEATURED = {
  q: 'What are the biggest economic costs of extreme heat?',
  a: [
    { text: 'Global extreme heat costs could reach ' },
    { text: '$3.1 trillion annually by 2035', bold: true },
    { text: ', driven by labor productivity losses' },
    { cite: 0 },
    { text: ', healthcare surges' },
    { cite: 3 },
    { text: ', and widespread crop failures' },
    { cite: 4 },
    { text: '.' },
  ],
  sources: [0, 1, 4],
};

// Response for any question
const makeResponse = (q) => ({
  q,
  paragraphs: [
    [
      { text: 'Extreme heat reduces labor productivity in outdoor industries by up to ' },
      { text: '12%', bold: true },
      { text: ' on days exceeding 95°F' },
      { cite: 0 },
      { text: ', while healthcare costs rise significantly from heat-related ER visits' },
      { cite: 3 },
      { text: '.' },
    ],
    [
      { text: 'Agricultural losses could cost the U.S. ' },
      { text: '$2.1B annually by 2040', bold: true },
      { text: ', with global losses reaching ' },
      { text: '$14B/yr by 2035', bold: true },
      { cite: 4 },
      { text: '.' },
    ],
    [
      { text: 'Infrastructure strain on roads, power grids, and water systems adds compounding costs during extreme heat events' },
      { cite: 2 },
      { text: '.' },
    ],
  ],
  sources: [0, 1, 2, 4],
});

// ── Icons ──────────────────────────────────────────────────
const AdobeMark = ({ size = 14 }) => (
  <svg width={size} height={size} viewBox="0 0 18 18" fill="none">
    <rect width="18" height="18" rx="2" fill={T.adobeRed}/>
    <path d="M9 3L14 15H11.5L9 8.5L6.5 15H4L9 3Z" fill="white"/>
  </svg>
);
const SparkleIcon = ({ size = 14, color = '#fff' }) => (
  <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
    <path d="M8 1v14M1 8h14M4.5 4.5l7 7M11.5 4.5l-7 7" stroke={color} strokeWidth="1.3" strokeLinecap="round" opacity="0.7"/>
    <circle cx="8" cy="8" r="2" fill={color}/>
  </svg>
);
const SendIcon = ({ color = '#fff', size = 13 }) => (
  <svg width={size} height={size} viewBox="0 0 13 13" fill="none">
    <path d="M1.5 6.5h10M7 2l4.5 4.5L7 11" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);
const FileIcon = ({ size = 10, color = T.muted }) => (
  <svg width={size} height={size*1.3} viewBox="0 0 11 14" fill="none">
    <path d="M1.5 0.5h6l3 3v10h-9v-13z" stroke={color} strokeWidth="1" fill="none"/>
    <path d="M7.5 0.5v3h3" stroke={color} strokeWidth="1"/>
    <path d="M3 6h5M3 8h5M3 10h3" stroke={color} strokeWidth="0.8" strokeLinecap="round"/>
  </svg>
);
const ChevronDown = ({ size = 10, color = T.muted }) => (
  <svg width={size} height={size} viewBox="0 0 10 10" fill="none">
    <path d="M2 3.5l3 3 3-3" stroke={color} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);

// ── Citation (expandable superscript) ──────────────────────
const Cite = ({ sourceIdx }) => {
  const [open, setOpen] = React.useState(false);
  const [pos, setPos] = React.useState({ left: 0, above: false });
  const wrapRef = React.useRef(null);
  const src = SOURCES[sourceIdx];
  if (!src) return null;

  React.useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    };
    const t = setTimeout(() => document.addEventListener('mousedown', handler), 0);
    return () => { clearTimeout(t); document.removeEventListener('mousedown', handler); };
  }, [open]);

  const toggle = (e) => {
    e.stopPropagation();
    if (open) { setOpen(false); return; }
    const rect = e.currentTarget.getBoundingClientRect();
    const popW = Math.min(320, window.innerWidth - 24);
    // Horizontal: shift left if would overflow right edge
    const overflowRight = rect.left + popW - (window.innerWidth - 12);
    const left = overflowRight > 0 ? -overflowRight : 0;
    // Vertical: flip above if would overflow bottom
    const popH = 150;
    const above = rect.bottom + popH > window.innerHeight - 12 && rect.top > popH + 12;
    setPos({ left, above });
    setOpen(true);
  };

  return (
    <span ref={wrapRef} style={{ position: 'relative', display: 'inline' }}>
      <sup
        onClick={toggle}
        style={{
          display: 'inline-block',
          background: open ? T.purple : T.citeBg,
          color: open ? '#fff' : T.citeText,
          fontSize: 9, fontWeight: 700, fontFamily: SYS,
          padding: '0 4px', borderRadius: 8,
          marginLeft: 2, cursor: 'pointer',
          minWidth: 14, lineHeight: '14px',
          textAlign: 'center',
          transition: 'background 0.12s, color 0.12s',
          userSelect: 'none',
          verticalAlign: 'super',
          top: 0,
        }}>{sourceIdx + 1}</sup>

      {open && (
        <span
          onClick={(e) => e.stopPropagation()}
          style={{
            position: 'absolute',
            [pos.above ? 'bottom' : 'top']: '100%',
            left: pos.left,
            marginTop: pos.above ? 0 : 6,
            marginBottom: pos.above ? 6 : 0,
            width: 'min(320px, calc(100vw - 24px))',
            background: '#fff',
            border: `1px solid ${T.border}`,
            borderRadius: 10,
            boxShadow: '0 10px 32px rgba(0,0,0,0.15), 0 2px 6px rgba(0,0,0,0.05)',
            padding: '11px 13px',
            zIndex: 150,
            fontFamily: SYS,
            display: 'block',
            animation: 'fadeIn 0.14s ease',
            textAlign: 'left',
            whiteSpace: 'normal',
            verticalAlign: 'baseline',
            cursor: 'default',
          }}>
          {/* Title row with number + link */}
          <div style={{ display: 'flex', gap: 8, marginBottom: 7, alignItems: 'flex-start' }}>
            <span style={{
              flexShrink: 0, marginTop: 2,
              background: T.citeBg, color: T.citeText,
              fontSize: 10, fontWeight: 700,
              padding: '0 5px', borderRadius: 8,
              minWidth: 16, height: 15, lineHeight: '15px',
              display: 'inline-block', textAlign: 'center',
            }}>{sourceIdx + 1}</span>
            <a
              href={src.url} target="_blank" rel="noopener noreferrer"
              onClick={(e) => e.stopPropagation()}
              style={{
                flex: 1, color: T.ink, textDecoration: 'none',
                fontSize: 13, fontWeight: 600, lineHeight: 1.35,
              }}>
              {src.title}
              <svg width="10" height="10" viewBox="0 0 11 11" fill="none" style={{ marginLeft: 4, flexShrink: 0, display: 'inline-block', verticalAlign: 'baseline' }}>
                <path d="M4 2h5v5M9 2l-6 6" stroke={T.purple} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </a>
          </div>
          {/* Source meta */}
          <div style={{ fontSize: 11, color: T.muted, marginBottom: 7, display: 'flex', alignItems: 'center', gap: 5 }}>
            <FileIcon size={9} color={T.muted}/>
            The New York Times · {src.date}
          </div>
          {/* Snippet preview */}
          <div style={{ fontSize: 12, color: '#444', lineHeight: 1.5 }}>
            {src.snippet}
          </div>
        </span>
      )}
    </span>
  );
};

// ── Rich text renderer ─────────────────────────────────────
const RichText = ({ parts }) => (
  <span>
    {parts.map((p, i) => {
      if (typeof p.cite === 'number') return <Cite key={i} sourceIdx={p.cite} />;
      if (p.bold) return <b key={i}>{p.text}</b>;
      return <span key={i}>{p.text}</span>;
    })}
  </span>
);

// ── Source pill strip ──────────────────────────────────────
// Menu renders via React Portal to document.body — escapes every
// overflow / stacking-context issue the pill strip would otherwise hit.
const SourcePills = ({ activeIndexes = [] }) => {
  const [openMenu, setOpenMenu] = React.useState(null);
  const [menuPos, setMenuPos] = React.useState({ top: 0, left: 0 });

  const openAt = (e, i) => {
    e.stopPropagation();
    e.preventDefault();
    if (openMenu === i) { setOpenMenu(null); return; }
    const rect = e.currentTarget.getBoundingClientRect();
    const menuW = 190;
    const menuH = 88;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    // Flip above if it would overflow the viewport bottom
    const top = rect.bottom + 6 + menuH > vh ? rect.top - menuH - 6 : rect.bottom + 6;
    // Nudge left if it would overflow the right edge
    const left = rect.left + menuW > vw - 8 ? Math.max(8, vw - menuW - 8) : rect.left;
    setMenuPos({ top, left });
    setOpenMenu(i);
  };

  const activeSrc = openMenu !== null ? SOURCES[openMenu] : null;

  return (
    <>
      <div style={{ display: 'flex', gap: 4, overflowX: 'auto', scrollbarWidth: 'none', paddingBottom: 1 }}>
        {SOURCES.map((src, i) => {
          const active = activeIndexes.includes(i);
          const open = openMenu === i;
          return (
            <div key={i} style={{ position: 'relative', flexShrink: 0 }}>
              <div style={{
                display: 'flex', alignItems: 'center', gap: 4,
                background: active ? T.purpleLight : '#f5f5f5',
                border: `1px solid ${active ? T.purpleBorder : T.border}`,
                borderRadius: 5, padding: '3px 5px 3px 7px',
                transition: 'all 0.12s',
              }}>
                <FileIcon size={8} color={active ? T.purple : T.muted}/>
                <span style={{ fontSize: 11, color: active ? T.purple : T.ink, fontFamily: SYS, whiteSpace: 'nowrap', maxWidth: 120, overflow: 'hidden', textOverflow: 'ellipsis' }}>{src.short}</span>
                <div
                  onClick={(e) => openAt(e, i)}
                  style={{
                    width: 18, height: 18, borderRadius: 3,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    color: open ? T.purple : '#888', fontSize: 13, letterSpacing: 0.5,
                    background: open ? '#ede9ff' : 'transparent',
                    cursor: 'pointer', flexShrink: 0, userSelect: 'none',
                  }}>···</div>
              </div>
            </div>
          );
        })}
      </div>

      {activeSrc && ReactDOM.createPortal(
        <>
          {/* Backdrop — any click outside the menu closes it */}
          <div
            onClick={() => setOpenMenu(null)}
            onContextMenu={() => setOpenMenu(null)}
            style={{ position: 'fixed', inset: 0, zIndex: 99998, background: 'transparent' }}
          />
          {/* Menu */}
          <div
            onClick={(e) => e.stopPropagation()}
            style={{
              position: 'fixed',
              top: menuPos.top, left: menuPos.left,
              zIndex: 99999,
              background: '#fff',
              border: `1px solid ${T.border}`,
              borderRadius: 8,
              boxShadow: '0 10px 32px rgba(0,0,0,0.18), 0 2px 6px rgba(0,0,0,0.06)',
              minWidth: 190,
              overflow: 'hidden',
              fontFamily: SYS,
              animation: 'fadeIn 0.12s ease',
            }}>
            <div style={{ padding: '8px 13px 4px', fontSize: 10, color: T.muted, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5, borderBottom: `1px solid ${T.border}`, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: 190 }}>
              {activeSrc.short}
            </div>
            {[
              { icon: '↗', label: 'Open article', action: () => window.open(activeSrc.url, '_blank', 'noopener,noreferrer') },
              { icon: '🔗', label: 'Copy link', action: () => {
                const val = activeSrc.url;
                if (navigator.clipboard?.writeText) navigator.clipboard.writeText(val);
                else {
                  const ta = document.createElement('textarea');
                  ta.value = val; document.body.appendChild(ta);
                  ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
                }
              }},
            ].map((item, j) => (
              <div key={j}
                onClick={() => { item.action(); setOpenMenu(null); }}
                style={{
                  display: 'flex', alignItems: 'center', gap: 10,
                  padding: '10px 14px', cursor: 'pointer', fontSize: 12.5,
                  color: T.ink,
                  transition: 'background 0.1s',
                }}
                onMouseEnter={(e) => e.currentTarget.style.background = '#f4f2ff'}
                onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
                <span style={{ width: 14, textAlign: 'center', fontSize: 13 }}>{item.icon}</span>
                {item.label}
              </div>
            ))}
          </div>
        </>,
        document.body
      )}
    </>
  );
};

// ── Typing dots ────────────────────────────────────────────
const TypingDots = () => (
  <div style={{ display: 'flex', gap: 4, padding: '4px 0', alignItems: 'center' }}>
    {[0,1,2].map(i => (
      <div key={i} style={{
        width: 6, height: 6, borderRadius: '50%',
        background: T.purple, opacity: 0.4,
        animation: `typing-dot 1.2s ${i*0.2}s infinite ease-in-out`,
      }}/>
    ))}
    <style>{`@keyframes typing-dot { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }`}</style>
  </div>
);

// ─────────────────────────────────────────────────────────
// THE EMBED WIDGET
// state: 'idle' | 'expanded' | 'typing' | 'loading' | 'response'
// ─────────────────────────────────────────────────────────
function EmbedWidget() {
  const [state, setState] = React.useState('idle');
  const [inputVal, setInputVal] = React.useState('');
  const [responses, setResponses] = React.useState([]); // chat history
  const [isLoading, setIsLoading] = React.useState(false);
  const inputRef = React.useRef(null);
  const chatRef = React.useRef(null);

  const expand = () => {
    setState('expanded');
    setTimeout(() => inputRef.current?.focus(), 100);
  };

  const handleFocus = () => {
    if (state === 'idle') expand();
  };

  const handleInputChange = (e) => {
    setInputVal(e.target.value);
    if (e.target.value.length > 0) setState('typing');
    else if (state === 'typing') setState('expanded');
  };

  const handleSend = (q) => {
    const question = (q || inputVal).trim();
    if (!question) return;
    setInputVal('');
    setIsLoading(true);
    setState('loading');
    // Simulate AI response delay
    setTimeout(() => {
      setResponses(prev => [...prev, makeResponse(question)]);
      setIsLoading(false);
      setState('response');
      setTimeout(() => {
        if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
      }, 50);
    }, 1400);
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  };

  const handleSuggestion = (text) => {
    setInputVal(text);
    setTimeout(() => handleSend(text), 0);
  };

  const isExpanded = state !== 'idle';

  // Filter suggestions while typing
  const filteredSuggs = inputVal.length > 1
    ? SUGGESTIONS.filter(s => s.toLowerCase().includes(inputVal.toLowerCase())).slice(0, 3)
    : SUGGESTIONS.slice(0, 3);

  return (
    <div style={{
      border: `1.5px solid ${isExpanded ? T.purpleFocus : T.purpleBorder}`,
      borderRadius: 12,
      background: T.white,
      boxShadow: isExpanded
        ? '0 4px 32px rgba(139,124,232,0.18), 0 1px 4px rgba(0,0,0,0.06)'
        : '0 2px 12px rgba(0,0,0,0.07)',
      transition: 'box-shadow 0.2s, border-color 0.2s',
      overflow: 'visible',
      margin: '14px 0 22px',
    }}>

      {/* ── Header ─────────────────────────────────────── */}
      <div style={{
        background: T.embedHeaderBg,
        padding: '8px 12px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        borderRadius: isExpanded ? '10px 10px 0 0' : 10,
        cursor: state === 'idle' ? 'pointer' : 'default',
      }} onClick={state === 'idle' ? expand : undefined}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
          <div style={{ width: 22, height: 22, background: 'rgba(255,255,255,0.2)', borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <SparkleIcon size={11} color="#fff"/>
          </div>
          <div style={{ fontSize: 12, fontWeight: 700, color: '#fff', fontFamily: SYS }}>Explore this topic in depth</div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 3, background: 'rgba(255,255,255,0.15)', borderRadius: 4, padding: '2px 7px' }}>
            <AdobeMark size={10}/>
            <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.9)', fontFamily: SYS, fontWeight: 600 }}>Powered by Adobe Acrobat</span>
          </div>
          <div
            onClick={(e) => { e.stopPropagation(); isExpanded ? (setState('idle'), setInputVal('')) : expand(); }}
            title={isExpanded ? 'Collapse' : 'Expand'}
            style={{ width: 22, height: 22, background: 'rgba(255,255,255,0.15)', borderRadius: 5, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', flexShrink: 0, transition: 'background 0.12s' }}
            onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(255,255,255,0.28)'}
            onMouseLeave={(e) => e.currentTarget.style.background = 'rgba(255,255,255,0.15)'}>
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
              {isExpanded
                ? <path d="M2 7l3.5-3.5L9 7" stroke="rgba(255,255,255,0.9)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                : <path d="M2 4l3.5 3.5L9 4" stroke="rgba(255,255,255,0.9)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              }
            </svg>
          </div>
        </div>
      </div>

      {/* ── Expanded body ──────────────────────────────── */}
      {isExpanded && (
        <div style={{ animation: 'fadeIn 0.18s ease' }}>

          {/* Chat history */}
          {responses.length > 0 && (
            <div ref={chatRef} style={{ maxHeight: 360, overflowY: 'auto', padding: '10px 12px 0' }}>
              {responses.map((resp, ri) => (
                <div key={ri} style={{ marginBottom: 20 }}>
                  {/* User bubble */}
                  <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 12 }}>
                    <div style={{
                      background: T.purpleGrad, color: '#fff',
                      borderRadius: '16px 16px 4px 16px',
                      padding: '9px 14px', fontSize: 13, fontFamily: SYS,
                      maxWidth: '82%', lineHeight: 1.5,
                      boxShadow: '0 2px 8px rgba(139,124,232,0.25)',
                    }}>{resp.q}</div>
                  </div>
                  {/* AI response */}
                  <div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8 }}>
                      <div style={{ width: 22, height: 22, background: T.purpleGrad, borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                        <SparkleIcon size={11} color="#fff"/>
                      </div>
                      <span style={{ fontSize: 11, fontWeight: 700, color: T.purple, fontFamily: SYS }}>AI Assistant</span>
                    </div>
                    <div style={{ fontSize: 13, fontFamily: SYS, color: '#1a1a1a', lineHeight: 1.72 }}>
                      {resp.paragraphs.map((parts, pi) => (
                        <p key={pi} style={{ marginBottom: pi < resp.paragraphs.length - 1 ? 9 : 0 }}>
                          <RichText parts={parts}/>
                        </p>
                      ))}
                    </div>
                    {/* Sources used */}
                    <div style={{ marginTop: 10, padding: '8px 12px', background: '#f8f6ff', borderRadius: 8, border: `1px solid rgba(139,124,232,0.1)` }}>
                      <div style={{ fontSize: 10, color: T.purple, fontFamily: SYS, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 6 }}>Sources used</div>
                      <SourcePills activeIndexes={resp.sources}/>
                    </div>
                    {/* Follow-up pills */}
                    {ri === responses.length - 1 && (
                      <div style={{ marginTop: 10 }}>
                        <div style={{ fontSize: 10, color: T.muted, fontFamily: SYS, marginBottom: 6 }}>Ask a follow-up</div>
                        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                          {['Which regions most affected?', 'Compare pre-2020 data', 'Heat and agriculture?'].map((q, qi) => (
                            <div key={qi}
                              onClick={() => handleSuggestion(q)}
                              style={{
                                fontSize: 11, color: T.purple,
                                border: `1px solid rgba(139,124,232,0.3)`,
                                background: T.purpleLight, borderRadius: 20,
                                padding: '4px 11px', cursor: 'pointer', fontFamily: SYS,
                                transition: 'background 0.1s',
                              }}
                              onMouseEnter={(e) => e.currentTarget.style.background = '#e4dfff'}
                              onMouseLeave={(e) => e.currentTarget.style.background = T.purpleLight}>
                              {q}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                  {ri < responses.length - 1 && <div style={{ height: 1, background: T.border, margin: '16px 0 0' }}/>}
                </div>
              ))}
            </div>
          )}

          {/* Loading state */}
          {isLoading && (
            <div style={{ padding: '10px 12px 0' }}>
              <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 12 }}>
                <div style={{
                  background: T.purpleGrad, color: '#fff',
                  borderRadius: '16px 16px 4px 16px',
                  padding: '9px 14px', fontSize: 13, fontFamily: SYS,
                  maxWidth: '82%', lineHeight: 1.5,
                  boxShadow: '0 2px 8px rgba(139,124,232,0.25)',
                  opacity: 0.9,
                }}>{responses.length > 0 ? inputVal : (inputVal || FEATURED.q)}</div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8 }}>
                <div style={{ width: 22, height: 22, background: T.purpleGrad, borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <SparkleIcon size={11} color="#fff"/>
                </div>
                <span style={{ fontSize: 11, fontWeight: 700, color: T.purple, fontFamily: SYS }}>AI Assistant</span>
              </div>
              <TypingDots/>
            </div>
          )}

          {/* Pre-canned Q&A (first expansion, no messages yet) */}
          {responses.length === 0 && !isLoading && (
            <div style={{ padding: '10px 12px 0' }}>
              <div style={{ marginBottom: 10 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginBottom: 5 }}>
                  <div style={{ width: 15, height: 15, background: T.purpleGrad, borderRadius: 3, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <SparkleIcon size={8} color="#fff"/>
                  </div>
                  <span style={{ fontSize: 10, fontWeight: 700, color: T.purple, fontFamily: SYS, textTransform: 'uppercase', letterSpacing: 0.4 }}>Featured question</span>
                </div>
                <div style={{ fontSize: 12, fontWeight: 600, color: T.ink, fontFamily: SYS, marginBottom: 5 }}>{FEATURED.q}</div>
                <div style={{ fontSize: 12, fontFamily: SYS, color: '#1a1a1a', lineHeight: 1.65 }}>
                  <RichText parts={FEATURED.a}/>
                </div>
                <div style={{ marginTop: 7, display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                  {FEATURED.sources.map(i => (
                    <div key={i} style={{ display: 'inline-flex', alignItems: 'center', gap: 4, background: T.citeBg, border: `1px solid rgba(139,124,232,0.3)`, borderRadius: 5, padding: '2px 7px' }}>
                      <FileIcon size={8} color={T.purple}/>
                      <span style={{ fontSize: 10, color: T.purple, fontFamily: SYS }}>{SOURCES[i].short}</span>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ height: 1, background: T.border, marginBottom: 9 }}/>

              {/* Suggested questions */}
              <div style={{ fontSize: 10, color: T.muted, fontFamily: SYS, marginBottom: 5 }}>Ask your own question</div>
              {SUGGESTIONS.slice(0, 3).map((s, i) => (
                <div key={i}
                  onClick={() => handleSuggestion(s)}
                  style={{
                    display: 'flex', alignItems: 'center', gap: 8,
                    padding: '7px 10px', borderRadius: 7,
                    border: `1px solid ${T.border}`, cursor: 'pointer',
                    marginBottom: 5, background: T.white, fontFamily: SYS,
                    transition: 'border-color 0.12s, background 0.12s',
                  }}
                  onMouseEnter={(e) => { e.currentTarget.style.borderColor = T.purpleBorder; e.currentTarget.style.background = '#faf9ff'; }}
                  onMouseLeave={(e) => { e.currentTarget.style.borderColor = T.border; e.currentTarget.style.background = T.white; }}>
                  <svg width="11" height="11" viewBox="0 0 13 13" fill="none" style={{ flexShrink: 0 }}>
                    <path d="M2 6.5h9M7 2.5l4 4-4 4" stroke={T.purple} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                  <span style={{ fontSize: 12, color: T.ink }}>{s}</span>
                </div>
              ))}

              {/* Sources */}
              <div style={{ marginTop: 9 }}>
                <div style={{ fontSize: 10, color: T.muted, fontFamily: SYS, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 5 }}>5 sources</div>
                <SourcePills/>
              </div>
            </div>
          )}

          {/* Suggestions while typing */}
          {state === 'typing' && filteredSuggs.length > 0 && (
            <div style={{ padding: '10px 16px 0' }}>
              <div style={{ fontSize: 10, color: T.muted, fontFamily: SYS, marginBottom: 6 }}>Suggestions</div>
              {filteredSuggs.map((s, i) => (
                <div key={i}
                  onClick={() => handleSuggestion(s)}
                  style={{
                    display: 'flex', alignItems: 'center', gap: 9,
                    padding: '8px 11px', borderRadius: 8,
                    border: `1px solid ${T.purpleBorder}`, cursor: 'pointer',
                    marginBottom: 5, background: '#faf9ff', fontFamily: SYS,
                  }}
                  onMouseEnter={(e) => e.currentTarget.style.background = T.purpleLight}
                  onMouseLeave={(e) => e.currentTarget.style.background = '#faf9ff'}>
                  <svg width="12" height="12" viewBox="0 0 13 13" fill="none" style={{ flexShrink: 0 }}>
                    <path d="M2 6.5h9M7 2.5l4 4-4 4" stroke={T.purple} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                  <span style={{ fontSize: 12, color: T.ink }}>{s}</span>
                </div>
              ))}
            </div>
          )}

          {/* Input bar */}
          <div style={{ padding: '8px 12px 10px', borderTop: responses.length > 0 || isLoading ? `1px solid ${T.border}` : 'none', marginTop: 8 }}>
            <div style={{
              display: 'flex', alignItems: 'center', gap: 7,
              background: state === 'typing' ? T.white : '#f7f7f7',
              borderRadius: 7, padding: '7px 10px',
              border: `1.5px solid ${state === 'typing' ? T.purpleFocus : T.border}`,
              boxShadow: state === 'typing' ? '0 0 0 3px rgba(139,124,232,0.07)' : 'none',
              transition: 'border-color 0.15s, box-shadow 0.15s',
            }}>
              <SparkleIcon size={12} color={state === 'typing' ? T.purple : '#ccc'}/>
              <input
                ref={inputRef}
                value={inputVal}
                onChange={handleInputChange}
                onFocus={handleFocus}
                onKeyDown={handleKeyDown}
                placeholder={responses.length > 0 ? 'Ask a follow-up…' : 'Ask a question about these articles…'}
                disabled={isLoading}
                style={{
                  flex: 1, border: 'none', outline: 'none',
                  background: 'transparent', fontSize: 12, fontFamily: SYS,
                  color: T.ink,
                }}
              />
              <div
                onClick={() => handleSend()}
                style={{
                  background: inputVal.trim() ? T.purpleGrad : 'transparent',
                  border: inputVal.trim() ? 'none' : `1.5px solid ${T.border}`,
                  borderRadius: 6, width: 26, height: 26,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  cursor: inputVal.trim() ? 'pointer' : 'default',
                  transition: 'background 0.15s',
                  boxShadow: inputVal.trim() ? '0 2px 6px rgba(139,124,232,0.3)' : 'none',
                  flexShrink: 0,
                }}>
                <SendIcon color={inputVal.trim() ? '#fff' : '#ccc'} size={11}/>
              </div>
            </div>
            <div style={{ fontSize: 10, color: '#ccc', fontFamily: SYS, marginTop: 4, textAlign: 'center' }}>
              AI responses may be inaccurate · <a href="#" style={{ color: '#ccc' }}>GenAI Guidelines</a>
            </div>
          </div>

        </div>
      )}

      {/* Idle state — just show input as a teaser */}
      {!isExpanded && (
        <div style={{ padding: '8px 12px 10px' }}>
          <div style={{ fontSize: 10, color: T.muted, fontFamily: SYS, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 6 }}>5 related articles</div>
          <SourcePills/>
          <div style={{ height: 1, background: T.border, margin: '8px 0' }}/>
          <div
            onClick={expand}
            style={{
              display: 'flex', alignItems: 'center', gap: 7,
              background: '#f7f7f7', borderRadius: 7, padding: '7px 10px', cursor: 'text',
              border: `1.5px solid ${T.border}`, transition: 'border-color 0.12s',
            }}
            onMouseEnter={(e) => e.currentTarget.style.borderColor = T.purpleBorder}
            onMouseLeave={(e) => e.currentTarget.style.borderColor = T.border}>
            <SparkleIcon size={12} color="#ccc"/>
            <span style={{ flex: 1, fontSize: 12, color: '#aaa', fontFamily: SYS }}>Ask a question about these articles…</span>
            <div style={{ background: T.purpleGrad, borderRadius: 6, width: 26, height: 26, display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: 0.35 }}>
              <SendIcon size={11}/>
            </div>
          </div>
          <div style={{ fontSize: 10, color: '#ccc', fontFamily: SYS, marginTop: 4, textAlign: 'center' }}>
            AI responses may be inaccurate · <a href="#" style={{ color: '#ccc' }}>GenAI Guidelines</a>
          </div>
        </div>
      )}

      <style>{`@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }`}</style>
    </div>
  );
}

        </div>

            <span key={n} className="nyt-nav-item" style={{ fontSize: 11, color: '#121212', fontFamily: SYS, fontWeight: 500, cursor: 'pointer' }}>{n}</span>
          ))}
        </div>
      </div>

      {/* Article */}
      <div className="article-col">

        {/* Byline */}
        <div style={{ fontSize: 11, fontFamily: SYS, color: '#6e6e6e', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>Science · Climate</div>

        {/* Headline */}
        <h1 className="article-headline" style={{ fontWeight: 700, lineHeight: 1.15, color: '#121212', fontFamily: TIMES, marginBottom: 14 }}>

        </h1>

        {/* Dek */}
        <p className="article-dek" style={{ color: '#444', fontFamily: TIMES, fontStyle: 'italic', marginBottom: 12, lineHeight: 1.5 }}>

        </p>

        <div style={{ height: 1, background: '#e2e2e2', margin: '18px 0 10px' }}/>

        {/* NYT action toolbar — Listen / Share / Save / Comments */}
        <div className="nyt-toolbar" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, marginBottom: 14, flexWrap: 'wrap' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, border: `1px solid ${T.border}`, borderRadius: 999, padding: '5px 12px 5px 6px', cursor: 'pointer' }}>
            <div style={{ width: 22, height: 22, borderRadius: '50%', border: `1px solid #333`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 1l6 3-6 3z" fill="#121212"/></svg>
            </div>
            <span style={{ fontSize: 12, color: '#121212', fontFamily: SYS }}>Listen · 8:06 min</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <div className="nyt-tb-btn" title="Gift article" style={{ display: 'flex', alignItems: 'center', gap: 6, border: `1px solid ${T.border}`, borderRadius: 999, padding: '5px 12px', cursor: 'pointer' }}>
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="5" width="11" height="7.5" stroke="#121212" strokeWidth="1.2"/><path d="M1 5h12M7 5v7.5M4.5 5c-1-0-1.8-.8-1.8-1.8S3.5 1.4 4.5 1.4C6 1.4 7 5 7 5s1-3.6 2.5-3.6c1 0 1.8.8 1.8 1.8S10.5 5 9.5 5" stroke="#121212" strokeWidth="1.2" strokeLinecap="round"/></svg>
              <span style={{ fontSize: 12, color: '#121212', fontFamily: SYS }}>Share full article</span>
            </div>
            <div className="nyt-tb-icon" title="Share" style={{ width: 32, height: 32, borderRadius: '50%', border: `1px solid ${T.border}`, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l5-4v2.5c4 0 5 2 5 6-1-2-2.5-3-5-3V10.5l-5-4z" stroke="#121212" strokeWidth="1.1" strokeLinejoin="round"/></svg>
            </div>
            <div className="nyt-tb-icon" title="Save" style={{ width: 32, height: 32, borderRadius: '50%', border: `1px solid ${T.border}`, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
              <svg width="11" height="13" viewBox="0 0 11 13" fill="none"><path d="M1.5 1.5h8v10l-4-2.8-4 2.8z" stroke="#121212" strokeWidth="1.1" strokeLinejoin="round"/></svg>

              <svg width="14" height="13" viewBox="0 0 14 13" fill="none"><path d="M1.5 1.5h11v8h-5l-3 2.5V9.5h-3z" stroke="#121212" strokeWidth="1.1" strokeLinejoin="round"/><circle cx="11.5" cy="2" r="1.8" fill="#2a82d9"/></svg>

        </div>

        {/* ── THE EMBED — placed in the premium slot right under the toolbar ── */}
        <EmbedWidget/>

        {/* Hero image */}

        <p className="article-body-p" style={{ color: '#222', fontFamily: TIMES, marginBottom: 18 }}>
          "The numbers are stark," said Dr. Priya Mehta, lead author of the WHO report. "We have been underestimating heat's economic drag for decades. Every model we've built has turned out to be too conservative."

        <p className="article-body-p" style={{ color: '#222', fontFamily: TIMES, marginBottom: 18 }}>

        </p>

        {/* Gray placeholder paragraphs */}
        {[5, 4, 5, 3].map((n, bi) => (
          <div key={bi} style={{ display: 'flex', flexDirection: 'column', gap: 7, marginBottom: 18 }}>

              <div key={li} style={{ height: 11, borderRadius: 3, background: '#ebebeb', width: li === n-1 ? '60%' : '100%' }}/>

      </div>

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
